name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22.x'

      - name: Install Dependencies
        run: npm ci

      - name: Build Web App
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android



      # Decode Keystore
      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/my-upload-key.keystore

      # Cambiar el nombre de la app dinámicamente y la versión
      - name: Update App Name and Version
        run: |
          sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">VentasPro<\/string>/g' android/app/src/main/res/values/strings.xml
          sed -i 's/<string name="title_activity_main">.*<\/string>/<string name="title_activity_main">VentasPro<\/string>/g' android/app/src/main/res/values/strings.xml
          sed -i 's/versionCode .*/versionCode ${{ github.run_number }}/' android/app/build.gradle
          sed -i 's/versionName .*/versionName "1.1.${{ github.run_number }}"/' android/app/build.gradle

      # Safety cleanup: remove any misplaced permissions/features that plugins may inject inside <application>
      - name: Fix Android Manifest
        run: |
          sed -i '/<application>/,/<\/application>/{/<uses-permission/d; /<uses-feature/d}' android/app/src/main/AndroidManifest.xml

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        run: |
          sudo apt-get install -y apksigner
          UNSIGNED_APK=$(find android/app/build/outputs/apk/release -name "*-universal-release-unsigned.apk" | head -n 1)
          echo "Signing: $UNSIGNED_APK"
          apksigner sign --ks android/my-upload-key.keystore --ks-key-alias ${{ secrets.ANDROID_KEY_ALIAS }} --ks-pass pass:${{ secrets.ANDROID_KEY_PASSWORD }} --key-pass pass:${{ secrets.ANDROID_KEY_PASSWORD }} --out android/app/build/outputs/apk/release/App_de_Ventas_v1.1.${{ github.run_number }}.apk "$UNSIGNED_APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: App_de_Ventas_v1.1.${{ github.run_number }}
          path: android/app/build/outputs/apk/release/App_de_Ventas_v1.1.${{ github.run_number }}.apk
