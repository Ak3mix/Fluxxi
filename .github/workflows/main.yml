name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22.x'

      # Usamos install para asegurar que los nuevos plugins se descarguen
      - name: Clean and Install Dependencies
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Build Web App
        run: npm run build

      - name: Reset Android Project
        run: |
          rm -rf android
          npx cap add android
          npx cap sync android

      # Decode Keystore
      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/my-upload-key.keystore

      # Cambiar el nombre de la app dinámicamente y la versión
      - name: Update App Name and Version
        run: |
          sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">Ventas Lee<\/string>/g' android/app/src/main/res/values/strings.xml
          sed -i 's/versionCode .*/versionCode ${{ github.run_number }}/' android/app/build.gradle

      # Permisos para Filesystem
      - name: Add Permissions
        run: |
          sed -i '/<application/i \    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />' android/app/src/main/AndroidManifest.xml

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        run: |
          sudo apt-get install -y apksigner
          apksigner sign --ks android/my-upload-key.keystore --ks-key-alias ${{ secrets.ANDROID_KEY_ALIAS }} --ks-pass pass:${{ secrets.ANDROID_KEY_PASSWORD }} --key-pass pass:${{ secrets.ANDROID_KEY_PASSWORD }} --out android/app/build/outputs/apk/release/App_de_Ventas_v${{ github.run_number }}.apk android/app/build/outputs/apk/release/app-release-unsigned.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: App_de_Ventas_v${{ github.run_number }}
          path: android/app/build/outputs/apk/release/App_de_Ventas_v${{ github.run_number }}.apk
