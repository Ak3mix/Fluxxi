            echo '  <string name="result_sms">Found SMS address</string>' >> $FILE
            echo '  <string name="result_tel">Found phone number</string>' >> $FILE
            echo '  <string name="result_text">Found plain text</string>' >> $FILE
            echo '  <string name="result_uri">Found URL</string>' >> $FILE
            echo '  <string name="result_wifi">Found WLAN Configuration</string>' >> $FILE
            echo '  <string name="preferences_actions_title">When a barcode is found...</string>' >> $FILE
            echo '  <string name="preferences_auto_focus_title">Use auto focus</string>' >> $FILE
            echo '  <string name="preferences_bulk_mode_summary">Scan and save many barcodes continuously</string>' >> $FILE
            echo '  <string name="preferences_bulk_mode_title">Bulk scan mode</string>' >> $FILE
            echo '  <string name="preferences_copy_to_clipboard_title">Copy to clipboard</string>' >> $FILE
            echo '  <string name="preferences_custom_product_search_summary">Substitutions: %s = contents, %f = format, %t = type</string>' >> $FILE
            echo '  <string name="preferences_custom_product_search_title">Custom search URL</string>' >> $FILE
            echo '  <string name="preferences_decode_1D_title">1D barcodes</string>' >> $FILE
            echo '  <string name="preferences_decode_Data_Matrix_title">Data Matrix</string>' >> $FILE
            echo '  <string name="preferences_decode_QR_title">QR Codes</string>' >> $FILE
            echo '  <string name="preferences_device_bug_workarounds_title">Device Bug Workarounds</string>' >> $FILE
            echo '  <string name="preferences_disable_continuous_focus_summary">Use only standard focus mode</string>' >> $FILE
            echo '  <string name="preferences_disable_continuous_focus_title">No continuous focus</string>' >> $FILE
            echo '  <string name="preferences_disable_exposure_title">No exposure</string>' >> $FILE
            echo '  <string name="preferences_front_light_summary">Improves scanning in low light on some phones, but may cause glare. Does not work on all phones.</string>' >> $FILE
            echo '  <string name="preferences_front_light_title">Use front light</string>' >> $FILE
            echo '  <string name="preferences_general_title">General settings</string>' >> $FILE
            echo '  <string name="preferences_name">Settings</string>' >> $FILE
            echo '  <string name="preferences_play_beep_title">Beep</string>' >> $FILE
            echo '  <string name="preferences_remember_duplicates_summary">Store multiple scans of the same barcode in History</string>' >> $FILE
            echo '  <string name="preferences_remember_duplicates_title">Remember duplicates</string>' >> $FILE
            echo '  <string name="preferences_result_title">Result settings</string>' >> $FILE
            echo '  <string name="preferences_scanning_title">When scanning for barcodes, decode...</string>' >> $FILE
            echo '  <string name="preferences_search_country">Search country</string>' >> $FILE
            echo '  <string name="preferences_supplemental_summary">Try to retrieve more information about the barcode contents</string>' >> $FILE
            echo '  <string name="preferences_supplemental_title">Retrieve more info</string>' >> $FILE
            echo '  <string name="preferences_try_bsplus">Try Barcode Scanner+</string>' >> $FILE
            echo '  <string name="preferences_try_bsplus_summary">Enhanced with new features and interface</string>' >> $FILE
            echo '  <string name="preferences_vibrate_title">Vibrate</string>' >> $FILE
            echo "</resources>" >> $FILE
          fi

      # Decode Keystore
      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > android/my-upload-key.keystore

      # Cambiar el nombre de la app dinámicamente y la versión
      - name: Update App Name and Version
        run: |
          sed -i 's/<string name="app_name">.*<\/string>/<string name="app_name">VentasPro<\/string>/g' android/app/src/main/res/values/strings.xml
          sed -i 's/<string name="title_activity_main">.*<\/string>/<string name="title_activity_main">VentasPro<\/string>/g' android/app/src/main/res/values/strings.xml
          sed -i 's/versionCode .*/versionCode ${{ github.run_number }}/' android/app/build.gradle
          sed -i 's/versionName .*/versionName "1.1.${{ github.run_number }}"/' android/app/build.gradle

      # Safety cleanup: remove any misplaced permissions/features that plugins may inject inside <application>
      - name: Fix Android Manifest
        run: |
          sed -i '/<application>/,/<\/application>/{/<uses-permission/d; /<uses-feature/d}' android/app/src/main/AndroidManifest.xml

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        run: |
          sudo apt-get install -y apksigner
          UNSIGNED_APK=$(find android/app/build/outputs/apk/release -name "*-universal-release-unsigned.apk" | head -n 1)
          echo "Signing: $UNSIGNED_APK"
          apksigner sign --ks android/my-upload-key.keystore --ks-key-alias ${{ secrets.ANDROID_KEY_ALIAS }} --ks-pass pass:${{ secrets.ANDROID_KEY_PASSWORD }} --key-pass pass:${{ secrets.ANDROID_KEY_PASSWORD }} --out android/app/build/outputs/apk/release/App_de_Ventas_v1.1.${{ github.run_number }}.apk "$UNSIGNED_APK"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: App_de_Ventas_v1.1.${{ github.run_number }}
          path: android/app/build/outputs/apk/release/App_de_Ventas_v1.1.${{ github.run_number }}.apk
