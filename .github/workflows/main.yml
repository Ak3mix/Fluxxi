            echo '  <string name="sbc_name">Google Book Search</string>' >> $FILE
            echo '  <string name="share_name">Share via barcode</string>' >> $FILE
            echo '  <string name="wifi_changing_network">Requesting connection to network...</string>' >> $FILE
            echo '  <string name="wifi_ssid_label">Network Name</string>' >> $FILE
