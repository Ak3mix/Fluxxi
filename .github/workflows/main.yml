name: Build Android APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '22.x'

      - name: Install Dependencies
        run: npm ci

      - name: Build Web App
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      # Fix ZXing activities missing android:exported
      - name: Fix ZXing Library Manifest
        run: |
          sed -i 's|<activity android:name="com.google.zxing.client.android.encode.EncodeActivity"|<activity android:name="com.google.zxing.client.android.encode.EncodeActivity" android:exported="false"|' android/capacitor-cordova-android-plugins/src/main/AndroidManifest.xml
          sed -i 's|<activity android:name="com.google.zxing.client.android.HelpActivity"|<activity android:name="com.google.zxing.client.android.HelpActivity" android:exported="false"|' android/capacitor-cordova-android-plugins/src/main/AndroidManifest.xml

      # Patch BarcodeScanner.java: remove WRITE_SETTINGS check, add onRequestPermissionResult
      - name: Patch BarcodeScanner Plugin
        run: |
          cp patches/cordova-plugin-barcodescanner/BarcodeScanner.java android/capacitor-cordova-android-plugins/src/main/java/com/phonegap/plugins/barcodescanner/BarcodeScanner.java

      # ZXing layout files reference string resources missing from default res/values/
      # Safety net: only create if missing (committed file has all strings)
      - name: Fix ZXing Default Strings
        run: |
          mkdir -p android/capacitor-cordova-android-plugins/src/main/res/values
          FILE=android/capacitor-cordova-android-plugins/src/main/res/values/strings.xml
          if [ ! -f "$FILE" ]; then
            echo "<?xml version='1.0' encoding='utf-8'?>" > $FILE
            echo "<resources>" >> $FILE
            echo '  <string name="button_back">Back</string>' >> $FILE
            echo '  <string name="button_done">Done</string>' >> $FILE
            echo '  <string name="button_google_shopper">Shopper</string>' >> $FILE
            echo '  <string name="button_search_book_contents">Search contents</string>' >> $FILE
            echo '  <string name="button_share_app">Application</string>' >> $FILE
            echo '  <string name="button_share_bookmark">Bookmark</string>' >> $FILE
            echo '  <string name="button_share_clipboard">Clipboard</string>' >> $FILE
            echo '  <string name="button_share_contact">Contact</string>' >> $FILE
            echo '  <string name="button_share_by_email">Share via email</string>' >> $FILE
            echo '  <string name="button_share_by_sms">Share via SMS</string>' >> $FILE
            echo '  <string name="button_add_calendar">Add to calendar</string>' >> $FILE
            echo '  <string name="button_add_contact">Add contact</string>' >> $FILE
            echo '  <string name="button_dial">Dial number</string>' >> $FILE
            echo '  <string name="button_email">Send email</string>' >> $FILE
            echo '  <string name="button_get_directions">Get directions</string>' >> $FILE
            echo '  <string name="button_mms">Send MMS</string>' >> $FILE
            echo '  <string name="button_open_browser">Open browser</string>' >> $FILE
            echo '  <string name="button_product_search">Product Search</string>' >> $FILE
            echo '  <string name="button_show_map">Show map</string>' >> $FILE
            echo '  <string name="button_sms">Send SMS</string>' >> $FILE
            echo '  <string name="button_web_search">Web search</string>' >> $FILE
            echo '  <string name="button_wifi">Connect to Network</string>' >> $FILE
            echo '  <string name="button_book_search">Book Search</string>' >> $FILE
            echo '  <string name="button_cancel">Cancel</string>' >> $FILE
            echo '  <string name="button_ok">OK</string>' >> $FILE
            echo '  <string name="app_picker_name">Applications</string>' >> $FILE
            echo '  <string name="bookmark_picker_name">Bookmarks</string>' >> $FILE
            echo '  <string name="msg_default_format">Format</string>' >> $FILE
            echo '  <string name="msg_default_meta">Metadata</string>' >> $FILE
            echo '  <string name="msg_default_status">Place a barcode inside the viewfinder rectangle to scan it.</string>' >> $FILE
            echo '  <string name="msg_default_time">Time</string>' >> $FILE
